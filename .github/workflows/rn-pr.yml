name: React Native PR

on:
  workflow_dispatch: {}
  pull_request:
    branches:
    - main
    paths:
    - packages/bhs-react/**

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: corepack enable
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'

    - run: yarn workspaces focus bhs-react
      working-directory: packages/bhs-react
    - run: yarn lint
      working-directory: packages/bhs-react
    - run: yarn tsc
      working-directory: packages/bhs-react
